<!DOCTYPE html>
<html>
<head>
    <title>Card Search</title>
    <style>
        body { font-family: Arial; }
        input {
            padding: 8px;
            font-size: 16px;
        }

        button {
            padding: 8px 12px;
            font-size: 16px;
            margin-left: 5px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
            text-align: center;
            border-radius: 8px;
        }
        img { height: 100px; }
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            padding: 10px;
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            max-height: 150px;
            object-fit: contain;
        }
        .card:hover {
            transform: scale(1.02);
            transition: transform 0.1s;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #ffffff;
            }

            .card {
                background-color: #1e1e1e;
                border: 1px solid #444;
            }

            input, button {
                background-color: #2a2a2a;
                color: #ffffff;
                border: 1px solid #555;
            }
        }
    </style>
</head>
<body>

<h2>Search Products</h2>
<input type="text" id="search" placeholder="Search..." />
<button id="searchBtn">Search</button>
<div id="results">Type and press Enter to search</div>

<script src="TCG_Grid_app.js"></script>

</body>
</html>
